# Phase 1: adapter-uncensored
# 1x H200 141GB RunPod Community Cloud, QLoRA NF4, 32K seq, 1 epoch
# Expected wall clock: ~4.2h training; total phase ~5h

base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

# Quantization (QLoRA NF4 + double quant)
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16

# LoRA
adapter: qlora
lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_linear: true

# Attention + kernels
flash_attention: true
plugins:
  - axolotl.integrations.liger.LigerPlugin
liger_rope: true
liger_rms_norm: true
liger_glu_activation: true
liger_fused_linear_cross_entropy: true

# Memory + throughput
gradient_checkpointing: true
sample_packing: true
pad_to_sequence_len: true
sequence_len: 32768

# Batch + steps
micro_batch_size: 2
gradient_accumulation_steps: 8
num_epochs: 1
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 2.0e-4
warmup_ratio: 0.03
weight_decay: 0.0
bf16: true

# Data
chat_template: chatml
datasets:
  - path: /workspace/data/uncensored_chatml.jsonl
    type: chat_template
    field_messages: messages
    message_field_role: role
    message_field_content: content

dataset_prepared_path: /workspace/data/prepared_uncensored
shuffle_merged_datasets: true
val_set_size: 0.0

# Outputs + Hub push (checkpoints + adapter → HF model repo)
output_dir: /workspace/outputs/adapter_uncensored
hub_model_id: russlle2/qwen3-coder-30b-a3b-adapter-uncensored
hub_strategy: checkpoint
hub_private_repo: true

save_strategy: steps
save_steps: 200
save_total_limit: 3
logging_steps: 10

# Monitoring
report_to: tensorboard
tensorboard_log_dir: /workspace/outputs/adapter_uncensored/tb

# Seeds
seed: 42
