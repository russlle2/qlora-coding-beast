# Phase 1: adapter-uncensored — Qwen3-Coder-30B-A3B MoE (Axolotl 0.16 MoE QLoRA)
# Based on axolotl examples/qwen3.5/35b-a3b-moe-qlora.yaml

base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct

plugins:
  - axolotl.integrations.liger.LigerPlugin
use_scattermoe: true
liger_rope: true
liger_rms_norm: true
liger_glu_activation: true
liger_fused_linear_cross_entropy: true

load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16
quantize_moe_experts: true

adapter: qlora
lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
lora_target_parameters:
  - mlp.experts.gate_up_proj
  - mlp.experts.down_proj

attn_implementation: flash_attention_2
gradient_checkpointing: true
activation_offloading: true
sample_packing: true
pad_to_sequence_len: true
sequence_len: 32768

micro_batch_size: 1
gradient_accumulation_steps: 16
num_epochs: 1
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 2.0e-4
warmup_ratio: 0.03
weight_decay: 0.0
bf16: true

chat_template: qwen3
datasets:
  - path: /workspace/data/uncensored_chatml.jsonl
    type: chat_template
    field_messages: messages
    message_property_mappings:
      role: role
      content: content

dataset_prepared_path: /workspace/data/prepared_uncensored
shuffle_merged_datasets: true
val_set_size: 0.0

output_dir: /workspace/outputs/adapter_uncensored
hub_model_id: russlle2/qwen3-coder-30b-a3b-adapter-uncensored
hub_strategy: checkpoint
hub_private_repo: true

save_strategy: steps
save_steps: 200
save_total_limit: 3
logging_steps: 10

report_to: tensorboard
tensorboard_log_dir: /workspace/outputs/adapter_uncensored/tb

seed: 42
